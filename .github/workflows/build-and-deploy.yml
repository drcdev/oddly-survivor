name: build-and-deploy

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "survivoR release tag to build against (default: latest)"
        required: false
        default: "latest"
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - "templates/**"
      - "static/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build-and-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Resolve upstream tag
        id: tag
        run: |
          REQ="${{ inputs.upstream_tag || 'latest' }}"
          if [ "$REQ" = "latest" ]; then
            RESOLVED=$(curl -fsSL https://api.github.com/repos/doehm/survivoR/releases/latest | jq -r .tag_name)
          else
            RESOLVED="$REQ"
          fi
          echo "resolved=$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "Resolved upstream tag: $RESOLVED"

      - name: Cache survivoR data
        uses: actions/cache@v4
        with:
          path: data/cache
          key: survivor-data-${{ steps.tag.outputs.resolved }}

      - name: Build site
        env:
          PAGES_URL: ${{ steps.deployment.outputs.page_url || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
        run: |
          uv run python -m pipeline.cli build \
            --tag "${{ steps.tag.outputs.resolved }}" \
            --pages-url "$PAGES_URL"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
